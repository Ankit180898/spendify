name: Deploy to Internal Testing

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Build & Deploy to Internal Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /home/runner/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=/home/runner/upload-keystore.jks
          EOF

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Create whatsnew directory
        run: |
          mkdir -p whatsnew
          git log -1 --pretty=%B > whatsnew/whatsnew-en-US

      - name: Upload to Play Store Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.sentientlabs.spendify
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          whatsNewDirectory: whatsnew
